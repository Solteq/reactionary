name: release

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - 'README.md'
      - 'documentation/**'
      - '**/*.md'

    branches:
      main



permissions:
  actions: read
  contents: write
  pull-requests: read
  id-token: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install

      - run: |
          node --version
          npm --version
          pnpm --version

      - name: Version and build
        run: |
          git config --global user.email "martin.rogne@solteq.com"
          git config --global user.name "Martin Rogne"
          pnpm exec nx release patch --yes --skip-publish -- --no-agents

      - name: Inspect package
        working-directory: dist/packages/core
        run: |
          node -p "require('./package.json').name"
          node -p "require('./package.json').version"
          npm pack --dry-run

      - name: Publish core with npm
        working-directory: dist/packages/core
        run: npm publish --access public

