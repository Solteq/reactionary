name: release

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - 'README.md'
      - 'documentation/**'
      - '**/*.md'

    branches:
      - main

  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  actions: read
  contents: write
  pull-requests: read
  id-token: write

env:
  VERSION_BUMP: ${{ inputs.version_bump || 'patch' }}

jobs:
  release:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - run: pnpm install

      - name: Release
        run: |
          git config --global user.email "martin.rogne@solteq.com"
          git config --global user.name "Martin Rogne"
          pnpm exec nx release "$VERSION_BUMP" --yes -- --no-agents
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_PROVENANCE: true
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_WRITE_ACCESS_TOKEN }}
