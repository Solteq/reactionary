name: main ci

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: release
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_WRITE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - run: pnpm dlx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="lint,build,test:offline"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install

      - uses: nrwl/nx-set-shas@v5

      - run: pnpm exec nx affected -t lint build test:offline
